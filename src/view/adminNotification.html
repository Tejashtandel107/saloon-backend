<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Slot Booked</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f2f2f2; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; }
        p { line-height: 1.6; }
        .slot { font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://thewebmax.org/saloni/images/logo-dark.png" alt="Salon Logo" class="logo">
        <h2>New Slot Booked</h2>
        <p>A new slot has been booked by a user:</p>
        <ul>
            <li><strong>Name:</strong> {{name}}</li>
            <li><strong>Email:</strong> {{email}}</li>
            <li><strong>Phone:</strong> {{phone}}</li>
            <li><strong>Slot:</strong> <span class="slot">{{slot}}</span></li>
        </ul>
        <p>Please take the necessary action.</p>
        <p>Best Regards,<br>System Notification</p>
    </div>
</body>
</html>
