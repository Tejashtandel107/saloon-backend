<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking Completed</title>
<style>
body { font-family: Arial, sans-serif; background: #f2f2f2; padding: 20px; }
.container { max-width: 600px; margin: auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
h2 { text-align: center; color: #28a745; }
p { line-height: 1.6; }
.slot { font-weight: bold; color: #333; }
.logo { display:block; margin:0 auto 20px; max-width:150px; }
</style>
</head>

<body>

<div class="container">

<img src="https://thewebmax.org/saloni/images/logo-dark.png" alt="Salon Logo" class="logo">

<h2>Service Completed</h2>

<p>Hello <strong>{{name}}</strong>,</p>

<p>Your salon appointment has been successfully completed.</p>

<ul>
<li><strong>Slot:</strong> <span class="slot">{{slot}}</span></li>
</ul>

<p>Thank you for visiting our salon. We hope you enjoyed the service.</p>

<p>We look forward to seeing you again soon!</p>

<p>Best Regards,<br>
Salon Team</p>

</div>

</body>
</html>
